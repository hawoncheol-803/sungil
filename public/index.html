<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css?v=20260709-1">
    <title>공부 플래너 - 로그인</title>
</head>
<body class="login-page" style="visibility:hidden;">
  <!-- 로그인/회원가입 폼 -->
  <div id="auth">
    <div id="auth-forms">
      <form id="signup-form" autocomplete="off">
        <h3>회원가입</h3>
        <label>
          아이디
          <input id="signup-username" required />
        </label>
        <label>
          비밀번호
          <input id="signup-password" type="password" required minlength="4" />
        </label>
        <button type="submit">회원가입</button>
      </form>

      <form id="login-form" autocomplete="off">
        <h3>로그인</h3>
        <label>
          아이디
          <input id="login-username" required />
        </label>
        <label>
          비밀번호
          <input id="login-password" type="password" required />
        </label>
        <button type="submit">로그인</button>
      </form>
    </div>

    <p id="auth-message" aria-live="polite"></p>
  </div>

  <script src="api.js?v=1"></script>
  <script src="auth.js?v=1"></script>
</body>
</html>
